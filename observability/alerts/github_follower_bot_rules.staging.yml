groups:
  - name: github-follower-bot-staging
    rules:
      - alert: GithubFollowerBotHighErrorRateStaging
        expr: rate(github_api_requests_total{status=~"5.."}[5m]) > 0.2
        for: 10m
        labels:
          severity: warning
          environment: staging
        annotations:
          summary: "[staging] GitHub API 5xx rate elevated"
          description: "Error rate over 0.2 req/s in the last 10m."

      - alert: GithubFollowerBotNoProgressStaging
        expr: increase(follow_attempts_total{status="success"}[30m]) == 0
        for: 30m
        labels:
          severity: critical
          environment: staging
        annotations:
          summary: "[staging] No successful follows in 30 minutes"
          description: "Bot may be blocked by policy/rate limits or workers are stalled."

      - alert: GithubFollowerBotLowRateLimitStaging
        expr: rate_limit_remaining < 100
        for: 10m
        labels:
          severity: warning
          environment: staging
        annotations:
          summary: "[staging] GitHub rate limit running low"
          description: "Rate limit under 100 remaining requests; investigate scheduler pressure."
