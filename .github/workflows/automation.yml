name: enterprise-hardening-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  enterprise-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_USER: ci-smoke-user
      PERSONAL_GITHUB_TOKEN: ci-smoke-token
      BOT_DRY_RUN: "true"
      RELEASE_MANIFEST_SIGNING_KEY: ci-signing-key
      RELEASE_MANIFEST_REQUIRE_SIGNATURE: "true"
      RELEASE_MANIFEST_MAX_AGE_SECONDS: "300"
      BOT_EVIDENCE_DIR: artifacts/enterprise-evidence
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify requirements pinning
        run: python scripts/check_requirements_pinned.py

      - name: Run file hardening check
        run: python bot.py check-file-hardening

      - name: Run enterprise verification gate
        run: bash ./scripts/enterprise_verify.sh

      - name: Build recurring closure evidence bundle
        run: |
          mkdir -p artifacts/enterprise-evidence
          python -m py_compile bot.py check_all_followers.py
          pytest -q | tee artifacts/enterprise-evidence/pytest_report.txt
          python bot.py doctor > artifacts/enterprise-evidence/doctor_report.json
          python bot.py export-audit --output artifacts/enterprise-evidence/audit.json > artifacts/enterprise-evidence/audit_export_stdout.json
          python bot.py export-postgres-migration-profile --output artifacts/enterprise-evidence/postgres_migration_profile_ci.json > artifacts/enterprise-evidence/postgres_migration_profile_ci_stdout.json
          python bot.py export-otel-operations-profile --output artifacts/enterprise-evidence/otel_operations_profile_ci.json > artifacts/enterprise-evidence/otel_operations_profile_ci_stdout.json
          python bot.py export-sbom --output artifacts/enterprise-evidence/sbom_ci.json > artifacts/enterprise-evidence/sbom_ci_stdout.json
          python bot.py export-release-manifest --output artifacts/enterprise-evidence/release_manifest_ci.json > artifacts/enterprise-evidence/release_manifest_ci_stdout.json
          python bot.py verify-release-manifest --manifest artifacts/enterprise-evidence/release_manifest_ci.json --require-signature --max-age-seconds 300 > artifacts/enterprise-evidence/release_manifest_verify_ci.json

      - name: Upload enterprise evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-evidence-${{ github.run_id }}
          path: artifacts/enterprise-evidence/
          if-no-files-found: error

  release-integrity-cosign:
    if: github.event_name != 'pull_request'
    needs: enterprise-verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
      COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export release manifest artifact for signing
        env:
          GITHUB_USER: ci-smoke-user
          PERSONAL_GITHUB_TOKEN: ci-smoke-token
          BOT_DRY_RUN: "true"
          RELEASE_MANIFEST_SIGNING_KEY: ci-signing-key
        run: |
          mkdir -p artifacts/cosign
          python bot.py export-release-manifest --output artifacts/cosign/release-manifest.json > artifacts/cosign/release-manifest.stdout.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Enforce Cosign signing key availability
        run: |
          test -n "${COSIGN_PRIVATE_KEY}" || (echo "Missing COSIGN_PRIVATE_KEY secret" >&2; exit 1)
          test -n "${COSIGN_PUBLIC_KEY}" || (echo "Missing COSIGN_PUBLIC_KEY secret" >&2; exit 1)
          test -n "${COSIGN_PASSWORD}" || (echo "Missing COSIGN_PASSWORD secret" >&2; exit 1)

      - name: Cosign sign release manifest
        run: |
          printf '%s' "$COSIGN_PRIVATE_KEY" > artifacts/cosign/cosign.key
          chmod 600 artifacts/cosign/cosign.key
          cosign sign-blob --yes --key artifacts/cosign/cosign.key --output-signature artifacts/cosign/release-manifest.sig artifacts/cosign/release-manifest.json

      - name: Cosign verify release manifest
        run: |
          printf '%s' "$COSIGN_PUBLIC_KEY" > artifacts/cosign/cosign.pub
          cosign verify-blob --key artifacts/cosign/cosign.pub --signature artifacts/cosign/release-manifest.sig artifacts/cosign/release-manifest.json

      - name: Upload cosign evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cosign-evidence-${{ github.run_id }}
          path: artifacts/cosign/
          if-no-files-found: error
